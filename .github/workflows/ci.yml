name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: cli
        run: npm install

      - name: Check JavaScript and Markdown
        working-directory: cli
        run: npm run check

      - name: Run CLI tests
        working-directory: cli
        run: npm test

      - name: Verify package build
        working-directory: cli
        run: npm pack --dry-run
